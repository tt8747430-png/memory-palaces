    <!-- Hand-authored manifest in public/, served as-is. vite-plugin-pwa's own manifest
         generation is turned off (`manifest: false`); it handles only the service worker. -->
    <link href="/manifest.webmanifest" rel="manifest" />
    <meta
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
      name="viewport"
    />

    <!-- Navy so the launch screen and the Android status bar match the navy safe-area
         band the app paints under the iOS status bar (white system text on navy). -->
    <meta content="#091A7A" name="theme-color" />
    <meta content="yes" name="mobile-web-app-capable" />

    <!-- `black`, NOT `black-translucent`. In a standalone home-screen app, black-translucent
         makes the web view extend UNDER the status bar, and iOS then offsets the entire
         standalone viewport up by the status-bar height — which surfaces as an intermittent
         white strip at the BOTTOM (env(safe-area-inset-bottom) reads 0; the gap equals
         safe-area-inset-top). See Ionic #12948 / SO "white bar at bottom of WEB-APP". A
         non-translucent bar reserves the status-bar area instead, so the viewport is never
         offset and the bottom stays clean. `black` keeps white status-bar text for the dark
         theme; modern iOS tints the bar from the manifest theme_color (navy) where supported. -->
    <meta content="black" name="apple-mobile-web-app-status-bar-style" />
    <meta content="Mindscape" name="apple-mobile-web-app-title" />
    <meta
      content="Mindscape — Your Memory Palace. Train recall with the method of loci. Offline-first."
      name="description"
    />

  <body>
    <div id="root">
      <!-- Boot splash: the brand ground + mark, painted the instant the HTML parses so the
           gap between the iOS launch image and React mounting is never a white (or daylight)
           flash. It mirrors the launch image, so the hand-off is seamless. React clears
           #root on its first render. -->
      <div
        style="
          position: fixed;
          inset: 0;
          display: grid;
          place-items: center;
          background: linear-gradient(to bottom, #091a7a, #4f8eff, #adc8ff);
        "
      >
        <svg
          width="42%"
          viewBox="0 0 200 200"
          fill="none"
          stroke="#adc8ff"
          stroke-width="3"
          stroke-linecap="round"
          stroke-linejoin="round"
          style="max-width: 180px"
        >

          <line x1="46" y1="64" x2="154" y2="64"></line>
          <line x1="64" y1="64" x2="64" y2="166"></line>
