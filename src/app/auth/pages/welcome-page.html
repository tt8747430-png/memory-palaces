<main
  class="pt-safe pb-safe relative flex h-full flex-col items-center justify-center gap-8 overflow-hidden bg-gradient-to-b from-primary via-accent to-secondary px-6 text-center"
>
  <div aria-hidden="true" class="t-aura pointer-events-none absolute left-1/2 top-1/2 size-[120%] rounded-full blur-3xl"></div>

  <span aria-hidden="true" class="t-ember pointer-events-none absolute z-0 size-2 rounded-full" style="left: 32%; top: 62%; --dx: 10px; --dy: -44px; --dur: 7s; --delay: 0.4s"></span>
  <span aria-hidden="true" class="t-ember pointer-events-none absolute z-0 size-2 rounded-full" style="left: 66%; top: 56%; --dx: -14px; --dy: -56px; --dur: 8s; --delay: 1.6s"></span>
  <span aria-hidden="true" class="t-ember pointer-events-none absolute z-0 size-2 rounded-full" style="left: 50%; top: 70%; --dx: 4px; --dy: -38px; --dur: 6.5s; --delay: 2.8s"></span>

  <ms-threshold class="relative z-10 size-48" />

  <div class="relative z-10 flex flex-col gap-2">
    <h1 class="text-balance text-[length:var(--ms-text-headline)] font-bold tracking-tight text-white">
      <ms-word-reveal [text]="'auth.welcome.greeting' | transloco: { name: name() }" [delay]="0.6" />
    </h1>
    <p class="t-body text-balance text-[length:var(--ms-text-sub)] text-white/85">
      {{ 'auth.welcome.body' | transloco }}
    </p>
  </div>

  <div class="t-cta-wrap relative z-10 w-full max-w-[360px]">
    <button matButton type="button" class="t-cta shadow-elevated" (click)="continue()">
      {{ 'auth.welcome.cta' | transloco }}
    </button>
  </div>
</main>
