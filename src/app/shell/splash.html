<button type="button" class="t-skip" (click)="dismiss()">
  {{ 'auth.splash.skip' | transloco }}
</button>

<div class="t-aura" aria-hidden="true"></div>
<span class="t-ring" aria-hidden="true"></span>

<ms-threshold class="t-logo" />

<div class="t-titles">
  <ms-word-reveal class="t-name" [text]="'common.appName' | transloco" [delay]="0.85" />
  <ms-word-reveal
    class="t-tagline"
    [text]="'auth.splash.tagline' | transloco"
    [delay]="1.15"
    [stagger]="0.06"
  />
</div>
